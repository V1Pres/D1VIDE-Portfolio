<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Page 3</title>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
        font-family: 'Luckiest Guy', cursive;
        overflow: hidden;
        position: relative;
        height: 100vh;
        width: 100vw;
    }

    /* Blurred background */
    .bg-blur {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url("images/Page3.jpg") center/cover no-repeat;
        filter: blur(20px);
        transform: scale(1.1);
        z-index: 1;
    }

    /* Foreground main image */
    .story-image {
        position: relative;
        width: 100%;
        height: 100%;
        object-fit: contain;
        z-index: 2;
    }

    /* Navigation arrows */
    .nav-buttons a {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 48px;
        color: white;
        text-decoration: none;
        background: rgba(0,0,0,0.4);
        padding: 15px 25px;
        border-radius: 20px;
        border: 2px solid white;
        transition: 0.3s;
        z-index: 3;
    }

    .nav-buttons a:hover {
        background: rgba(255,255,255,0.7);
        color: black;
    }

    .prev { left: 20px; }
    .next { right: 20px; visibility:hidden; } /* Hide next arrow on last page */

    /* Back to Home button at top middle */
    .home-button {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 20px;
        color: white;
        text-decoration: none;
        background: rgba(0,0,0,0.7);
        padding: 8px 20px;
        border-radius: 15px;
        border: 2px solid white;
        transition: 0.3s;
        z-index: 3;
    }

    .home-button:hover {
        background: white;
        color: black;
    }
</style>
</head>
<body>

<!-- Blurred background -->
<div class="bg-blur"></div>

<!-- Main image -->
<img src="images/Page3.jpg" alt="Story Page 3" class="story-image">

<!-- Navigation -->
<div class="nav-buttons">
    <a class="prev" href="page2.html">⬅</a>
    <a class="next">➡</a>
</div>

<!-- Back to Home at top middle -->
<a href="index.html" class="home-button">Back to Home</a>

</body>
</html>
